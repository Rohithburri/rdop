<!DOCTYPE html>
<html>
<head>
    <title>Continue Order</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 520px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            color: green;
        }

        button {
            padding: 14px 24px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Delivery Available</h1>

    <p>Your location is within our delivery range.</p>

    <p>You can now continue to cart, checkout, or order page.</p>

    <button>Continue Shopping</button>
</div>

</body>
</html>
