<!DOCTYPE html>
<html>
<head>
    <title>Check Delivery Location</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 480px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #222;
        }

        p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #000;
        }

        button:disabled {
            background: #777;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
            line-height: 1.5;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .loading {
            color: #444;
        }
    </style>
</head>
<body>

<!-- Django CSRF token -->
<form style="display: none;">
    {% csrf_token %}
</form>

<div class="container">
    <h1>Check Delivery Availability</h1>

    <p>
        To continue, please allow location access.
        We will check whether your location is within our 10 km delivery range.
    </p>

    <button id="locationButton" onclick="getCustomerLocation()">
        Allow Location Access
    </button>

    {% if error %}
        <div class="message error">{{ error }}</div>
    {% endif %}

    <div id="message" class="message"></div>
</div>

<script>
    function getCookie(name) {
        let cookieValue = null;

        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');

            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();

                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }

        return cookieValue;
    }

    function getCSRFToken() {
        let token = getCookie('csrftoken');

        if (!token) {
            const csrfInput = document.querySelector('[name=csrfmiddlewaretoken]');
            if (csrfInput) {
                token = csrfInput.value;
            }
        }

        return token;
    }

    function getCustomerLocation() {
        const messageBox = document.getElementById("message");
        const locationButton = document.getElementById("locationButton");

        if (!navigator.geolocation) {
            messageBox.innerHTML = "Your browser does not support location access.";
            messageBox.className = "message error";
            return;
        }

        messageBox.innerHTML = "Getting your location...";
        messageBox.className = "message loading";
        locationButton.disabled = true;
        locationButton.innerHTML = "Checking Location...";

        navigator.geolocation.getCurrentPosition(
            function(position) {
                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;

                checkLocationWithBackend(latitude, longitude);
            },

            function(error) {
                if (error.code === error.PERMISSION_DENIED) {
                    messageBox.innerHTML = "Location permission denied. Please allow location to continue.";
                } else if (error.code === error.POSITION_UNAVAILABLE) {
                    messageBox.innerHTML = "Location information is unavailable.";
                } else if (error.code === error.TIMEOUT) {
                    messageBox.innerHTML = "Location request timed out. Please try again.";
                } else {
                    messageBox.innerHTML = "Unable to get your location.";
                }

                messageBox.className = "message error";
                locationButton.disabled = false;
                locationButton.innerHTML = "Allow Location Access";
            },

            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    }

    function checkLocationWithBackend(latitude, longitude) {
        const messageBox = document.getElementById("message");
        const locationButton = document.getElementById("locationButton");
        const csrftoken = getCSRFToken();

        if (!csrftoken) {
            messageBox.innerHTML = "CSRF token missing. Please refresh the page and try again.";
            messageBox.className = "message error";
            locationButton.disabled = false;
            locationButton.innerHTML = "Allow Location Access";
            return;
        }

        fetch("/check-location/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrftoken
            },
            credentials: "same-origin",
            body: JSON.stringify({
                latitude: latitude,
                longitude: longitude
            })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Server error: " + response.status);
            }

            return response.json();
        })
        .then(data => {
            if (data.success && data.deliverable) {
                messageBox.innerHTML =
                    data.message + "<br>Distance: " + data.distance_km + " km";
                messageBox.className = "message success";

                setTimeout(function() {
                    window.location.href = "/next-step/";
                }, 1500);
            } else {
                messageBox.innerHTML =
                    data.message + "<br>Distance: " + data.distance_km + " km";
                messageBox.className = "message error";

                locationButton.disabled = false;
                locationButton.innerHTML = "Try Again";
            }
        })
        .catch(error => {
            messageBox.innerHTML = "Something went wrong. Please refresh and try again.";
            messageBox.className = "message error";

            locationButton.disabled = false;
            locationButton.innerHTML = "Try Again";

            console.log(error);
        });
    }
</script>

</body>
</html>
